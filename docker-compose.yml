services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DB_PATH: /app/data/posted.db
      # To customize news sources, mount your own file (see bot/README.md):
      # SOURCES_PATH: /app/sources.json
    volumes:
      - bot-data:/app/data
      # - ./sources.json:/app/sources.json:ro

volumes:
  bot-data:
